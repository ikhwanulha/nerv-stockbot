<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#0a0a0f" stroke="#10b981" stroke-width="2"/>
  <circle cx="60" cy="60" r="55" fill="url(#bgGrad)" opacity="0.1"/>

  <!-- Candlesticks -->
  <!-- 1st candle (green) -->
  <rect x="18" y="40" width="16" height="50" rx="2" fill="#22c55e" opacity="0.9"/>
  <rect x="24" y="20" width="4" height="76" rx="1" fill="#22c55e" opacity="0.5"/>

  <!-- 2nd candle (red) -->
  <rect x="40" y="48" width="16" height="42" rx="2" fill="#ef4444" opacity="0.9"/>
  <rect x="46" y="38" width="4" height="66" rx="1" fill="#ef4444" opacity="0.5"/>

  <!-- 3rd candle (green, taller) -->
  <rect x="62" y="30" width="16" height="60" rx="2" fill="#22c55e" opacity="0.9"/>
  <rect x="68" y="12" width="4" height="88" rx="1" fill="#22c55e" opacity="0.5"/>

  <!-- 4th candle (red) -->
  <rect x="84" y="55" width="16" height="35" rx="2" fill="#ef4444" opacity="0.9"/>
  <rect x="90" y="42" width="4" height="58" rx="1" fill="#ef4444" opacity="0.5"/>

  <!-- Eyes (NERV Evangelion reference) -->
  <g opacity="0.3">
    <circle cx="35" cy="95" r="4" fill="#10b981"/>
    <circle cx="85" cy="95" r="4" fill="#10b981"/>
  </g>

  <!-- Scan line -->
  <line x1="4" y1="90" x2="116" y2="90" stroke="#10b981" stroke-width="1" opacity="0.2"/>

  <!-- Pulse dot -->
  <circle cx="105" cy="15" r="3" fill="#10b981">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
